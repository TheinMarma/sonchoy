<body>

  <!-- Google tag (gtag.js) — moved out of <head> and deferred to window load.
       Setting up dataLayer + consent + config first so any in-flight events
       queue correctly; the actual gtag library only loads after the page is
       interactive, so it never competes with the critical JS for bandwidth. -->
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }

    // Consent Mode v2 — deny ad-related signals by default so gtag.js doesn't
    // invoke the deprecated Attribution Reporting API. Flip these to 'granted'
    // from a cookie banner if/when the user opts in.
    gtag('consent', 'default', {
      ad_storage: 'denied',
      ad_user_data: 'denied',
      ad_personalization: 'denied',
      analytics_storage: 'granted'
    });

    gtag('js', new Date());
    gtag('config', 'G-KVWPT8FMTS', {
      allow_google_signals: false,
      allow_ad_personalization_signals: false,
      ads_data_redaction: true
    });

    window.addEventListener('load', function () {
      var s = document.createElement('script');
      s.async = true;
      s.src = 'https://www.googletagmanager.com/gtag/js?id=G-KVWPT8FMTS';
      document.head.appendChild(s);
    });
  </script>
</body>
