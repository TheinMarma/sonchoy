<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sonchoy — Free, fast PDF tools for everyday document work</title>
  <meta name="description"
    content="Convert, edit, and generate PDFs in seconds. 25+ free tools — and a doorway to advanced features through pdfFiller's free trial." />

  <!-- Fonts: preconnect + parallel stylesheet (faster than @import inside CSS) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap"
    media="print" onload="this.media='all'" />
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" />
  </noscript>

  <!-- Google tag (gtag.js) — deferred to window load so it never competes
       with the critical bundle on FCP/LCP. -->
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }

    // Consent Mode v2 — deny ad-related signals by default so gtag.js doesn't
    // invoke the deprecated Attribution Reporting API. Flip these to 'granted'
    // from a cookie banner if/when the user opts in.
    gtag('consent', 'default', {
      ad_storage: 'denied',
      ad_user_data: 'denied',
      ad_personalization: 'denied',
      analytics_storage: 'granted'
    });

    gtag('js', new Date());
    gtag('config', 'G-KVWPT8FMTS', {
      allow_google_signals: false,
      allow_ad_personalization_signals: false,
      ads_data_redaction: true
    });

    // Load the actual gtag library after the page is interactive so it
    // doesn't steal bandwidth from FCP/LCP-critical assets.
    window.addEventListener('load', function () {
      var s = document.createElement('script');
      s.async = true;
      s.src = 'https://www.googletagmanager.com/gtag/js?id=G-KVWPT8FMTS';
      document.head.appendChild(s);
    });
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
